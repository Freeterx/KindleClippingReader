<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindle Clipping Reader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Top Bar ── */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 20px;
            background: #2c3e50;
            color: #fff;
            flex-shrink: 0;
        }

        .top-bar h1 {
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
        }

        .top-bar .file-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 24px;
        }

        .top-bar label {
            font-size: 13px;
            color: #bdc3c7;
        }

        .top-bar input[type="file"] {
            font-size: 13px;
            color: #ecf0f1;
        }

        .top-bar input[type="file"]::-webkit-file-upload-button {
            background: #3498db;
            color: #fff;
            border: none;
            padding: 5px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        .top-bar input[type="file"]::-webkit-file-upload-button:hover {
            background: #2980b9;
        }

        .file-status {
            font-size: 12px;
            color: #95a5a6;
            margin-left: auto;
        }

        /* ── Help Button & Popover ── */
        .help-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1.5px solid #7fb3d8;
            background: transparent;
            color: #7fb3d8;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .help-btn:hover {
            background: #3498db;
            color: #fff;
            border-color: #3498db;
        }

        .help-popover {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 10px;
            width: 360px;
            background: #fff;
            color: #333;
            border-radius: 8px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            z-index: 1000;
            font-size: 13px;
            line-height: 1.55;
            padding: 0;
            overflow: hidden;
        }

        .help-popover::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            width: 12px;
            height: 12px;
            background: #2c3e50;
        }

        .help-btn:hover .help-popover,
        .help-btn:focus .help-popover {
            display: block;
        }

        .help-popover-header {
            background: #2c3e50;
            color: #fff;
            padding: 10px 14px;
            font-weight: 600;
            font-size: 13px;
        }

        .help-popover-body {
            padding: 12px 14px;
        }

        .help-popover-body .path-section {
            margin-bottom: 10px;
        }

        .help-popover-body .path-section:last-child {
            margin-bottom: 0;
        }

        .help-popover-body .path-label {
            font-weight: 600;
            color: #2c3e50;
            font-size: 12px;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .help-popover-body .path-value {
            background: #f4f6f8;
            padding: 5px 10px;
            border-radius: 4px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 12px;
            color: #c0392b;
            border: 1px solid #e8e8e8;
            word-break: break-all;
        }

        .help-popover-body .help-note {
            font-size: 11px;
            color: #888;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #eee;
        }

        /* ── Main Layout ── */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Left Panel: Book List ── */
        .left-panel {
            width: 280px;
            min-width: 220px;
            background: #fff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .left-panel-header {
            padding: 10px 12px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .left-panel-header h2 {
            font-size: 14px;
            font-weight: 600;
            color: #2c3e50;
        }

        .book-count-badge {
            font-size: 11px;
            background: #3498db;
            color: #fff;
            padding: 1px 8px;
            border-radius: 10px;
            margin-left: auto;
        }

        .filter-row {
            padding: 8px 12px;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        #bookFilter {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }

        #bookFilter:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.15);
        }

        .book-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }

        .book-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.1s;
            font-size: 13px;
        }

        .book-item:hover {
            background: #f0f7ff;
        }

        .book-item.selected {
            background: #e8f4fd;
            border-left: 3px solid #3498db;
            padding-left: 9px;
        }

        .book-item.show-all {
            font-weight: 600;
            color: #3498db;
            border-bottom: 2px solid #e0e0e0;
        }

        .book-item .book-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #2c3e50;
        }

        .book-item .clip-count {
            font-size: 11px;
            color: #999;
            flex-shrink: 0;
        }

        .book-item .highlight-count,
        .book-item .note-count {
            font-size: 10px;
            padding: 0 5px;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .book-item .highlight-count {
            background: #fef9e7;
            color: #b7950b;
        }

        .book-item .note-count {
            background: #eaf2f8;
            color: #2471a3;
        }

        .book-list::-webkit-scrollbar {
            width: 6px;
        }

        .book-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        /* ── Right Panel: Editor ── */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .editor-toolbar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .toolbar-btn {
            padding: 5px 12px;
            border: 1px solid #ccc;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            color: #555;
            transition: all 0.15s ease;
        }

        .toolbar-btn:hover {
            background: #e9ecef;
            border-color: #adb5bd;
        }

        .toolbar-btn.primary {
            background: #3498db;
            color: #fff;
            border-color: #2980b9;
        }

        .toolbar-btn.primary:hover {
            background: #2980b9;
        }

        .toolbar-btn.success {
            background: #27ae60;
            color: #fff;
            border-color: #219a52;
        }

        .toolbar-btn.success:hover {
            background: #219a52;
        }

        .toolbar-btn.danger {
            background: #e74c3c;
            color: #fff;
            border-color: #c0392b;
        }

        .toolbar-btn.danger:hover {
            background: #c0392b;
        }

        .toolbar-separator {
            width: 1px;
            height: 24px;
            background: #ddd;
            margin: 0 4px;
        }

        #editor {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            outline: none;
            font-size: 14px;
            line-height: 1.6;
            background: #fff;
        }

        #editor .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 300px;
            color: #aaa;
            text-align: center;
        }

        #editor .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        #editor .empty-state .title {
            font-size: 18px;
            color: #999;
            margin-bottom: 8px;
        }

        #editor .empty-state .subtitle {
            font-size: 13px;
            color: #bbb;
        }

        /* Clipping entry styles */
        .clip-entry {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 6px;
            border-left: 4px solid;
            position: relative;
        }

        .clip-entry.highlight {
            background-color: #fef9e7;
            border-left-color: #f1c40f;
        }

        .clip-entry.note {
            background-color: #eaf2f8;
            border-left-color: #3498db;
        }

        .clip-entry.bookmark {
            background-color: #f0faf0;
            border-left-color: #27ae60;
        }

        .clip-meta {
            font-size: 11px;
            color: #999;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .clip-meta-sep {
            color: #ccc;
            margin: 0 2px;
        }

        .clip-type-badge {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .clip-entry.highlight .clip-type-badge {
            background: #f1c40f;
            color: #7d6608;
        }

        .clip-entry.note .clip-type-badge {
            background: #3498db;
            color: #fff;
        }

        .clip-entry.bookmark .clip-type-badge {
            background: #27ae60;
            color: #fff;
        }

        .clip-content {
            font-size: 14px;
            line-height: 1.5;
            color: #2c3e50;
        }

        .clip-entry.note .clip-content {
            font-style: italic;
        }

        /* Combined highlight + note entry */
        .clip-entry.highlight-with-note {
            background: linear-gradient(135deg, #fef9e7 0%, #fef9e7 70%, #eaf2f8 100%);
            border-left-color: #f1c40f;
            border-right: 3px solid #3498db;
        }

        .clip-entry.highlight-with-note .clip-type-badge.hl-badge {
            background: #f1c40f;
            color: #7d6608;
        }

        .clip-entry.highlight-with-note .clip-type-badge.nt-badge {
            background: #3498db;
            color: #fff;
        }

        .attached-note {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #ccc;
        }

        .attached-note-label {
            font-size: 11px;
            font-weight: 600;
            color: #2471a3;
            margin-bottom: 3px;
        }

        .attached-note-content {
            font-size: 13px;
            line-height: 1.5;
            color: #2471a3;
            font-style: italic;
        }

        /* Book group header in editor */
        .book-group {
            margin-bottom: 24px;
        }

        .book-title-header {
            font-size: 16px;
            font-weight: 700;
            color: #2c3e50;
            padding: 8px 0;
            margin-bottom: 8px;
            border-bottom: 2px solid #3498db;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .book-title-header .book-icon {
            font-size: 18px;
        }

        .book-title-header .book-count {
            font-size: 11px;
            color: #999;
            font-weight: 400;
            margin-left: auto;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 16px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #777;
            flex-shrink: 0;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .stat-dot.hl {
            background: #f1c40f;
        }

        .stat-dot.nt {
            background: #3498db;
        }

        .stat-dot.bk {
            background: #27ae60;
        }

        /* Scrollbar */
        #editor::-webkit-scrollbar {
            width: 8px;
        }

        #editor::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        #editor::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        #editor::-webkit-scrollbar-thumb:hover {
            background: #aaa;
        }

        /* Resize handle */
        .left-panel {
            resize: horizontal;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <h1>📚 Kindle Clipping Reader</h1>
        <div class="file-group">
            <label for="fileInput">Select clipping file:</label>
            <input type="file" id="fileInput" accept=".txt">
            <button class="help-btn" title="Where to find clippings?">?
                <div class="help-popover">
                    <div class="help-popover-header">📁 Where to find your Kindle clippings</div>
                    <div class="help-popover-body">
                        <div class="path-section">
                            <div class="path-label">🔌 Kindle E-Reader (via USB)</div>
                            <div class="path-value">Kindle\documents\My Clippings.txt</div>
                        </div>
                        <div class="path-section">
                            <div class="path-label">💻 Kindle for PC (Windows)</div>
                            <div class="path-value">C:\Users\&lt;You&gt;\Documents\My Kindle Content\My Clippings.txt</div>
                        </div>
                        <div class="path-section">
                            <div class="path-label">🍎 Kindle for Mac</div>
                            <div class="path-value">/Users/&lt;You&gt;/Library/Containers/com.amazon.Kindle/Data/Library/My Clippings.txt</div>
                        </div>
                        <div class="help-note">
                            💡 Connect your Kindle via USB cable, then navigate to the <strong>documents</strong> folder. The file is named <strong>My Clippings.txt</strong> and contains all your highlights, notes, and bookmarks.
                        </div>
                    </div>
                </div>
            </button>
        </div>
        <span class="file-status" id="fileStatus">No file loaded</span>
    </div>

    <!-- Main Layout -->
    <div class="main-container">
        <!-- Left Panel: Book List -->
        <div class="left-panel">
            <div class="left-panel-header">
                <h2>📖 Books</h2>
                <span class="book-count-badge" id="bookCountBadge">0</span>
            </div>
            <div class="filter-row">
                <input type="text" id="bookFilter" placeholder="🔍 Filter books...">
            </div>
            <div class="book-list" id="bookList">
                <div style="padding:20px;text-align:center;color:#bbb;font-size:13px;">
                    Load a clipping file to see books
                </div>
            </div>
        </div>

        <!-- Right Panel: Editor -->
        <div class="right-panel">
            <div class="editor-toolbar">
                <button class="toolbar-btn" id="btnCopyText" title="Copy as plain text">📋 Copy Text</button>
                <button class="toolbar-btn" id="btnCopyHtml" title="Copy as rich text">📄 Copy Rich</button>
                <div class="toolbar-separator"></div>
                <button class="toolbar-btn success" id="btnSendOneNote" title="Copy and open OneNote">📓 Send to OneNote</button>
                <div class="toolbar-separator"></div>
                <button class="toolbar-btn primary" id="btnViewTab" title="Open in new tab">🗗 New Tab</button>
            </div>

            <div id="editor">
                <div class="empty-state">
                    <div class="icon">📂</div>
                    <div class="title">No clippings loaded</div>
                    <div class="subtitle">Select a Kindle clipping file (.txt) from the top bar to get started</div>
                </div>
            </div>

            <div class="stats-bar" id="statsBar">
                <span class="stat-item">Load a file to get started</span>
            </div>
        </div>
    </div>

    <script src="scripts/kindleclipping.js"></script>
</body>

</html>
